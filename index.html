    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      loadSavedSession();
    });

    function loadSavedSession() {
      const savedUser = localStorage.getItem('sman15_user');
      if (savedUser) {
        try {
          currentUser = JSON.parse(savedUser);
          renderApp();
          return;
        } catch (e) {
          localStorage.removeItem('sman15_user');
        }
      }
      renderLoginView();
    }

    function saveSession(user) {
      currentUser = user;
      localStorage.setItem('sman15_user', JSON.stringify(user));
      renderApp();
    }

    function logout() {
      currentUser = null;
      localStorage.removeItem('sman15_user');
      stopWebcam();
      document.getElementById('bottom-nav').classList.add('hidden');
      document.getElementById('btn-logout').classList.add('hidden');
      renderLoginView();
    }

    function renderApp() {
      if (!currentUser) {
        renderLoginView();
        return;
      }

      document.getElementById('btn-logout').classList.remove('hidden');

      if (currentUser.role === 'student') {
        document.getElementById('bottom-nav').classList.remove('hidden');
        navigateTo('dashboard');
      } else if (currentUser.role === 'teacher') {
        document.getElementById('bottom-nav').classList.add('hidden');
        renderTeacherDashboard();
      }
    }

    function navigateTo(viewName) {
      // Update Bottom Nav Styling
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('text-emerald-400');
        btn.classList.add('text-slate-400');
      });
      const targetNav = document.getElementById(`nav-${viewName}`);
      if (targetNav) {
        targetNav.classList.remove('text-slate-400');
        targetNav.classList.add('text-emerald-400');
      }

      // Stop camera if navigating away from check-in pages
      if (viewName !== 'sleep' && viewName !== 'wake') {
        stopWebcam();
      }

      switch (viewName) {
        case 'dashboard': renderStudentDashboard(); break;
        case 'sleep': renderCheckInView('tidur'); break;
        case 'wake': renderCheckInView('bangun'); break;
        case 'leaderboard': renderLeaderboardView(); break;
        case 'history': renderHistoryView(); break;
        case 'profile': renderProfileView(); break;
        default: renderStudentDashboard();
      }
    }

      const teacherForm = document.getElementById('form-login-teacher');

        studentTab.className = "flex-1 py-2.5 rounded-xl font-bold text-xs transition bg-emerald-500 text-slate-950 shadow-md font-game";
        teacherTab.className = "flex-1 py-2.5 rounded-xl font-bold text-xs transition text-slate-400 hover:text-white font-game";
        studentForm.classList.remove('hidden');
        teacherForm.classList.add('hidden');
      } else {
        teacherTab.className = "flex-1 py-2.5 rounded-xl font-bold text-xs transition bg-teal-500 text-slate-950 shadow-md font-game";
        studentTab.className = "flex-1 py-2.5 rounded-xl font-bold text-xs transition text-slate-400 hover:text-white font-game";

        studentForm.classList.add('hidden');

    }

    function fillDemoStudent(name, phase, className) {
      switchLoginTab('student');
      document.getElementById('login-student-name').value = name;
      document.getElementById('login-student-phase').value = phase;
      document.getElementById('login-student-class').value = className;

      switchLoginTab('teacher');
      document.getElementById('login-teacher-name').value = name;
      document.getElementById('login-teacher-pass').value = pass;

    function handleStudentLogin(e) {
      e.preventDefault();
      const name = document.getElementById('login-student-name').value.trim();
      const phase = document.getElementById('login-student-phase').value;
      const className = document.getElementById('login-student-class').value.trim();

      // Check if student exists in mock DB or auto-register
      let student = MOCK_DB.students.find(s => s.name.toLowerCase() === name.toLowerCase());

      if (!student) {
        // Dynamic registration
        student = {
          id: 'S' + Date.now().toString().slice(-4),
          name: name,
          phase: phase,
          className: className,
          teacherName: 'Drs. Ahmad Dahlan, M.Pd',
          parentPhone: '6281200000000',
          points: 10,
          level: '🌱 Pemula',
          badge: '🥉 Bronze',
          streak: 1,
          disciplineRate: 100,
          avatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(name)}`,
          history: []
        };
        MOCK_DB.students.push(student);
      }

      saveSession({ role: 'student', data: student });
    }

    function handleTeacherLogin(e) {
      e.preventDefault();
      const name = document.getElementById('login-teacher-name').value;
      const pass = document.getElementById('login-teacher-pass').value;

      const teacher = MOCK_DB.teachers.find(t => t.name === name && t.pass === pass);

        saveSession({ role: 'teacher', data: teacher });
      } else {
        alertModal('⚠️ Login Gagal', 'Nama guru atau password tidak valid (Password standar: guru123)');

    }

    function generateCalendarDots() {
      // Mock days array for current week
      const days = [
        { status: 'green' }, { status: 'green' }, { status: 'green' }, 
        { status: 'green' }, { status: 'yellow' }, { status: 'green' }, { status: 'none' }
      ];

      return days.map((d, idx) => {
        let colorClass = 'bg-slate-800 text-slate-500';
        if (d.status === 'green') colorClass = 'bg-emerald-500 text-slate-950 font-extrabold';
        if (d.status === 'yellow') colorClass = 'bg-amber-500 text-slate-950 font-extrabold';

        return `
          <div class="aspect-square rounded-xl ${colorClass} flex items-center justify-center text-xs font-game">
            ${idx + 17}
          </div>
        `;
      }).join('');
    }

    function initStudentChart() {
      const ctx = document.getElementById('studentProgressChart');
      if (!ctx) return;

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Sn', 'Sl', 'Rb', 'Km', 'Jm', 'Sb', 'Mg'],
          datasets: [{
            label: 'Skor Disiplin Waktu',
            data: [100, 100, 95, 100, 80, 100, 90],
            borderColor: '#10b981',
            backgroundColor: 'rgba(16, 185, 129, 0.15)',
            fill: true,
            tension: 0.4,
            borderWidth: 3,
            pointBackgroundColor: '#10b981',
            pointRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 } } },
            y: { min: 50, max: 100, grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { size: 10 } } }
          }
        }
      });
    }

    let selectedMood = '😄 Segar';
    function selectMood(mood, btn) {
      selectedMood = mood;
      document.querySelectorAll('.mood-btn').forEach(b => {
        b.classList.remove('border-emerald-500', 'text-emerald-300');
        b.classList.add('border-slate-700', 'text-slate-400');
      });
      btn.classList.remove('border-slate-700', 'text-slate-400');
      btn.classList.add('border-emerald-500', 'text-emerald-300');
    }

    function updateWatermarkTimer() {
      setInterval(() => {
        const dateEl = document.getElementById('wm-date-time');
        if (dateEl) {
          const now = new Date();
          dateEl.innerText = now.toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short' }) + ' • ' + now.toLocaleTimeString('id-ID') + ' WIT';
        }
      }, 1000);
    }

    function fetchGeoLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            currentGeoLocation = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)} (Malteng)`;
            const geoEl = document.getElementById('wm-geo-location');
            if (geoEl) geoEl.innerText = '📍 GPS: ' + currentGeoLocation;
          },
          (err) => {
            currentGeoLocation = '-3.6541, 128.1822 (GPS Default SMAN 15)';
          }
        );
      }
    }

    async function startWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        activeWebcamStream = stream;
        const video = document.getElementById('webcam-video');
        if (video) {
          video.srcObject = stream;
        }
        const placeholder = document.getElementById('camera-placeholder');
        if (placeholder) placeholder.classList.add('hidden');
      } catch (err) {
        alertModal('📷 Akses Kamera Ditolak', 'Harap berikan izin penggunaan kamera langsung untuk melakukan check-in.');
      }
    }

    function stopWebcam() {
      if (activeWebcamStream) {
        activeWebcamStream.getTracks().forEach(track => track.stop());
        activeWebcamStream = null;
      }
    }

    function submitCheckIn(type) {
      if (!activeWebcamStream) {
        alertModal('⚠️ Kamera Aktif Diperlukan', 'Harap aktifkan kamera langsung sebelum menekan tombol.');
        return;
      }

      // Play victory sound or confetti trigger
      confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

      const isSleep = type === 'tidur';
      const pointsGained = 5;
      
      // Update student points in local state
      currentUser.data.points += pointsGained;
      currentUser.data.streak += 1;
      
      const newHistoryItem = {
        date: new Date().toISOString().split('T')[0],
        type: type,
        time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
        status: 'Disiplin',
        points: pointsGained,
        mood: selectedMood,
        location: currentGeoLocation
      };
      currentUser.data.history.unshift(newHistoryItem);

      // Save updated state
      saveSession(currentUser);

      const modalTitle = isSleep ? '😴 Selamat Beristirahat!' : '🌅 Selamat Pagi!';
      const modalMessage = isSleep 
        ? 'Kamu berhasil check-in Tidur Cepat tepat waktu. Sampai jumpa besok pagi!' 
        : 'Hebat! Kamu berhasil bangun tepat waktu. Selamat beraktivitas hari ini!';

      alertModal(modalTitle, `
        <div class="text-center space-y-3">
          <div class="text-4xl animate-bounce">${isSleep ? '🌙' : '☀️'}</div>
          <p class="text-sm text-slate-300">${modalMessage}</p>
          <div class="p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl text-emerald-400 font-bold font-game text-xs">
            +${pointsGained} Poin Tambahan Dikreditkan!
          </div>
        </div>
      `, () => {
        stopWebcam();
        navigateTo('dashboard');
      });
    }

    function exportToExcel() {
      if (typeof XLSX === 'undefined') {
        alertModal('⚠️ Lib Inactive', 'Library Excel sedang dimuat. Harap coba beberapa saat lagi.');
        return;
      }

      const teacher = currentUser.data;
      const classStudents = MOCK_DB.students.filter(s => s.teacherName === teacher.name);
      const todayStr = new Date().toISOString().split('T')[0];

      // Prepare data array for Excel
      const excelData = classStudents.map((s, index) => {
        const todayHistory = s.history.filter(h => h.date === todayStr || h.date === '2026-07-23');
        const hasTidur = todayHistory.some(h => h.type === 'tidur') ? 'Selesai' : 'Belum';
        const hasBangun = todayHistory.some(h => h.type === 'bangun') ? 'Selesai' : 'Belum';
        const isTerlambat = todayHistory.some(h => h.status === 'Terlambat') ? 'Ya' : 'Tidak';

        return {
          'No': index + 1,
          'ID Siswa': s.id,
          'Nama Lengkap': s.name,
          'Fase': s.phase,
          'Kelas': s.className,
          'Guru Wali': s.teacherName,
          'Status Tidur Cepat': hasTidur,
          'Status Bangun Pagi': hasBangun,
          'Terlambat': isTerlambat,
          'Streak (Hari)': s.streak,
          'Total Poin': s.points,
          'Tingkat Kedisiplinan': `${s.disciplineRate}%`,
          'Badge Level': s.badge,
          'No HP Orang Tua': s.parentPhone
        };
      });

      // Create Worksheet and Workbook using SheetJS
      const worksheet = XLSX.utils.json_to_sheet(excelData);

      // Auto-fit column widths
      const colWidths = [
        { wch: 5 },  // No
        { wch: 10 }, // ID
        { wch: 25 }, // Nama
        { wch: 10 }, // Fase
        { wch: 12 }, // Kelas
        { wch: 25 }, // Guru Wali
        { wch: 18 }, // Status Tidur
        { wch: 18 }, // Status Bangun
        { wch: 12 }, // Terlambat
        { wch: 12 }, // Streak
        { wch: 12 }, // Poin
        { wch: 20 }, // Kedisiplinan
        { wch: 15 }, // Badge
        { wch: 18 }, // No HP
      ];
      worksheet['!cols'] = colWidths;

      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, 'Laporan Disiplin');

      // Export file as genuine XLSX
      const fileName = `Laporan_Kokurikuler_${teacher.classHandled.replace(/\s+/g, '_')}_${todayStr}.xlsx`;
      XLSX.writeFile(workbook, fileName);
    }

      if (confirm('Apakah Anda yakin ingin menghapus siswa ini?')) {
        MOCK_DB.students = MOCK_DB.students.filter(s => s.id !== id);
        renderTeacherDashboard();
      }
    }

    function openAnnouncementModal() {
      showModal('Kirim Pengumuman Kelas', `
        <div class="space-y-4">
          <textarea id="announcement-text" rows="3" placeholder="Tulis pesan pengumuman..." class="w-full p-3 bg-slate-800 border border-slate-700 rounded-2xl text-xs text-white"></textarea>
          <button onclick="postAnnouncement()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold font-game text-xs rounded-xl btn-3d">
            Kirim Pengumuman Sekarang
          </button>
        </div>
      `);
    }

    function postAnnouncement() {
      const text = document.getElementById('announcement-text').value.trim();
      if (text) {
        MOCK_DB.announcements.unshift({
          id: Date.now(),
          text: text,
          sender: currentUser.data.name,
          time: 'Baru saja'
        });
        closeModal();
        alertModal('✅ Berhasil', 'Pengumuman telah dikirim ke seluruh siswa bimbingan!');
      }
    }

    function exportToExcel() {
      let csv = 'ID,Nama,Fase,Kelas,Poin,Streak,Kedisiplinan\n';
      MOCK_DB.students.forEach(s => {
        csv += `"${s.id}","${s.name}","${s.phase}","${s.className}",${s.points},${s.streak},"${s.disciplineRate}%"\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.setAttribute('href', url);
      a.setAttribute('download', `Laporan_Kokurikuler_${currentUser.data.classHandled}.csv`);
      a.click();
    }

    function openGuideModal() {
      showModal('📘 Kode GAS & Panduan Deploy', `
        <div class="space-y-4 text-xs">
          <div class="p-3 bg-slate-800 rounded-2xl space-y-2 border border-slate-700">
            <h5 class="font-extrabold text-emerald-400 font-game">1. Backend Google Apps Script (Code.gs)</h5>
            <p class="text-slate-300 text-[11px]">Salin kode di bawah ini ke editor Google Apps Script kamu:</p>
            <textarea readonly rows="8" class="w-full font-mono text-[10px] p-2 bg-slate-950 text-emerald-300 rounded-xl border border-slate-800 focus:outline-none">
function doGet(e) {
  return ContentService.createTextOutput(JSON.stringify({ status: "success", message: "API SMAN 15 Maluku Tengah Active" }))
    .setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(data.sheetName || "CheckIns");
    
    if (data.action === "CHECK_IN") {
      sheet.appendRow([
        new Date(),
        data.studentId,
        data.studentName,
        data.className,
        data.type,
        data.time,
        data.location,
        data.mood
      ]);
      return responseJSON({ status: "success", message: "Check-in berhasil disimpan" });
    }
  } catch(err) {
    return responseJSON({ status: "error", message: err.toString() });
  }
}

function responseJSON(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}
            </textarea>
          </div>

          <div class="p-3 bg-slate-800 rounded-2xl space-y-1.5 border border-slate-700 text-slate-300">
            <h5 class="font-extrabold text-teal-400 font-game">2. Langkah Deploy GitHub Pages</h5>
            <ol class="list-decimal list-inside space-y-1 text-[11px]">
              <li>Buat repositori baru di GitHub dengan nama <code class="text-amber-300">kokurikuler-sman15</code>.</li>
              <li>Upload file <code class="text-amber-300">index.html</code> ini ke dalam repositori.</li>
              <li>Buka menu Settings > Pages > Pilih Branch <code class="text-amber-300">main</code> > Save.</li>
            </ol>
          </div>
        </div>
      `);
    }

    function showModal(title, bodyHtml) {
      const modalBox = document.getElementById('modal-box');
      modalBox.innerHTML = `
        <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-800">
          <h3 class="font-extrabold font-game text-base text-white">${title}</h3>
          <button onclick="closeModal()" class="p-1 rounded-lg text-slate-400 hover:text-white">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        <div>${bodyHtml}</div>
      `;
      document.getElementById('modal-overlay').classList.remove('hidden');
      lucide.createIcons();
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
    }

    function alertModal(title, contentHtml, onCloseCallback) {
      showModal(title, `
        <div class="space-y-4 text-center">
          <div>${contentHtml}</div>
          <button id="alert-ok-btn" class="w-full py-3 bg-emerald-500 text-slate-950 font-bold font-game text-xs rounded-xl btn-3d">
            Selesai / Mengerti
          </button>
        </div>
      `);
      document.getElementById('alert-ok-btn').onclick = () => {
        closeModal();
        if (onCloseCallback) onCloseCallback();
      };
    }
  </script>
</body>
</html>
